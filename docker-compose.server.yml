# Docker Compose for SERVER DEPLOYMENT
# Production-grade setup with monitoring, scaling, and persistence

version: '3.8'

services:
  # ============================================================
  # PyReverseETL API Server (scalable)
  # ============================================================
  pyreverseetl:
    image: ghcr.io/mullassery/pyreverseetl:latest
    container_name: pyreverseetl-api
    restart: unless-stopped
    environment:
      # Core configuration
      RUST_LOG=info
      DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/pyreverseetl

      # Security
      JWT_SECRET=${JWT_SECRET}
      ENCRYPTION_KEY=${ENCRYPTION_KEY}

      # API Configuration
      API_HOST=0.0.0.0
      API_PORT=8080
      API_WORKERS=8

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      PROMETHEUS_ADDR=0.0.0.0:9090

      # Performance
      CONNECTION_POOL_SIZE=20
      CACHE_SIZE_MB=1024
      MAX_BATCH_SIZE=10000
    ports:
      - "8080:8080"      # REST API
    volumes:
      - pyreverseetl_data:/app/data
      - pyreverseetl_logs:/app/logs
      - ./config/pyreverseetl.toml:/app/config/pyreverseetl.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - pyreverseetl
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # Data Storage
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: pyreverseetl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: pyreverseetl
      POSTGRES_INITDB_ARGS: "-c max_connections=100 -c shared_buffers=256MB"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pyreverseetl
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: pyreverseetl-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pyreverseetl
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  # ============================================================
  # Monitoring & Logging
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: pyreverseetl-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - pyreverseetl
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  grafana:
    image: grafana/grafana:latest
    container_name: pyreverseetl-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - pyreverseetl
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: pyreverseetl-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      MEMORY_MAX_TRACES: 10000
    ports:
      - "6831:6831/udp"
      - "16686:16686"
    volumes:
      - jaeger_data:/badger
    networks:
      - pyreverseetl
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ============================================================
  # Backup Service
  # ============================================================
  postgres-backup:
    image: postgres:16-alpine
    container_name: pyreverseetl-backup
    restart: always
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: /bin/sh -c "while true; do /backup.sh; sleep 86400; done"
    depends_on:
      - postgres
    networks:
      - pyreverseetl

  # ============================================================
  # Reverse Proxy / Load Balancer
  # ============================================================
  nginx:
    image: nginx:latest
    container_name: pyreverseetl-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - pyreverseetl
    networks:
      - pyreverseetl
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

volumes:
  pyreverseetl_data:
  pyreverseetl_logs:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  jaeger_data:
  nginx_cache:

networks:
  pyreverseetl:
    driver: bridge
